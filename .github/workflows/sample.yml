name: Training Session

on:
  push:
    branches:
      - feature/JP
  workflow_dispatch:

jobs:
  demo-job:
   runs-on: windows-latest

   steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: 17
    
    - name: Java Version
      run: java -version
   
