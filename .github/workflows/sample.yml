name: Training Session

on:
  push:
    branches:
      - feature/JP
  workflow_dispatch:

jobs:
  demo-job:
   runs-on: windows-latest

   steps:
    - name: Checkout Code
      uses: actions/checkout@v4
    
    - name: Java Version
      run: java -version
      
    - name: Checking mvn version
      run: mvn clean install

    - name: display folder
      run: dir target

    - name: display folder ear file
      run: dir target\*.jar

    - name: upload the jar files
      uses: actions/upload-artifact@v4
      with:
        name: jar-package
        path: target/*.jar
